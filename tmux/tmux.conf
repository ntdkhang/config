set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'


set -g prefix C-b
unbind C-a
bind C-b send-prefix

set -s escape-time 10

set -g status-style 'bg=#333333 fg=#5eacd3'
set-option -g status-right ""

bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1


# Sort session by name
bind s choose-tree -sZ -O name

set -g mouse on

# Experimental passthrough slows redraws in some terminals; keep it off for now
# set -gq allow-passthrough on

# Pane border highlighting
set -g pane-border-style 'fg=#444444'
set -g pane-active-border-style fg=orange,bold
set -g pane-border-indicators both



set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# vim-like pane switching
bind ^ last-window
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R


# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %


# SESSION NAVIGATION
bind o switch-client -l  # move to last session

# Rebind zoom from prefix-z to prefix-a
unbind z
bind a resize-pane -Z

# Move pane to another window
bind m command-prompt -p "send pane to window:" "join-pane -h -t ':%%'"
bind M break-pane


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'


set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'


set -g @continuum-boot 'on'
set -g @continuum-restore 'on'
set -g @continuum-boot-options 'alacritty'


set -g @plugin 'aserowy/tmux.nvim'

set -g @plugin 'Morantron/tmux-fingers'


# navigation
set -g @tmux-nvim-navigation true
set -g @tmux-nvim-navigation-cycle true
set -g @tmux-nvim-navigation-keybinding-left 'C-h'
set -g @tmux-nvim-navigation-keybinding-down 'C-j'
set -g @tmux-nvim-navigation-keybinding-up 'C-k'
set -g @tmux-nvim-navigation-keybinding-right 'C-l'

# resize
set -g @tmux-nvim-resize true
set -g @tmux-nvim-resize-step-x 1
set -g @tmux-nvim-resize-step-y 1
set -g @tmux-nvim-resize-keybinding-left 'M-h'
set -g @tmux-nvim-resize-keybinding-down 'M-j'
set -g @tmux-nvim-resize-keybinding-up 'M-k'
set -g @tmux-nvim-resize-keybinding-right 'M-l'


# NOTE: Removed manual is_vim navigation - using tmux.nvim plugin instead
# The plugin handles vim/tmux navigation without spawning shell processes

